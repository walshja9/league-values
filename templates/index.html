{% extends "base.html" %}

{% block content %}
<form id="league-setup"
      hx-get="/rankings"
      hx-target="#rankings-container"
      hx-trigger="change delay:100ms, keyup changed delay:300ms from:#search-input"
      hx-sync="this:replace">

    <section class="mode-selector">
        <label class="mode-btn">
            <input type="radio" name="mode" value="categories"
                   {{ 'checked' if mode == 'categories' else '' }}>
            <span>H2H Categories</span>
        </label>
        <label class="mode-btn">
            <input type="radio" name="mode" value="roto"
                   {{ 'checked' if mode == 'roto' else '' }}>
            <span>Roto</span>
        </label>
        <label class="mode-btn">
            <input type="radio" name="mode" value="points"
                   {{ 'checked' if mode == 'points' else '' }}>
            <span>Points</span>
        </label>
    </section>

    <section id="setup-panel" class="setup-panel">
        {% if mode == 'points' %}
            {% include "partials/setup_points.html" %}
        {% else %}
            {% include "partials/setup_categories.html" %}
        {% endif %}
    </section>

    <section class="filter-bar">
        <div class="pool-toggle">
            <label class="pool-btn">
                <input type="radio" name="pool" value=""
                       {{ 'checked' if not pool else '' }}>
                <span>All</span>
            </label>
            <label class="pool-btn">
                <input type="radio" name="pool" value="hitter"
                       {{ 'checked' if pool == 'hitter' else '' }}>
                <span>Hitters</span>
            </label>
            <label class="pool-btn">
                <input type="radio" name="pool" value="pitcher"
                       {{ 'checked' if pool == 'pitcher' else '' }}>
                <span>Pitchers</span>
            </label>
        </div>

        <select name="position" class="position-select">
            <option value="">All Positions</option>
            {% for pos in ["C","1B","2B","SS","3B","OF","DH","SP","RP"] %}
            <option value="{{ pos }}" {{ 'selected' if position == pos else '' }}>{{ pos }}</option>
            {% endfor %}
        </select>

        <input type="text" name="search" id="search-input"
               class="search-input" placeholder="Search players..."
               value="{{ search }}">
    </section>
</form>

<div id="rankings-container">
    {% include "partials/rankings_table.html" %}
</div>

<div id="compare-bar" class="compare-bar" style="display:none;">
    <span id="compare-count">0 selected</span>
    <button id="compare-btn" onclick="openCompare()" disabled>Compare</button>
    <button onclick="clearCompare()" class="btn-clear">Clear</button>
</div>

<div id="compare-overlay" class="compare-overlay" style="display:none;"></div>

<script>
const selected = new Set();

function toggleCompare(id, el) {
    if (selected.has(id)) {
        selected.delete(id);
        el.classList.remove('selected');
    } else {
        if (selected.size >= 2) return;
        selected.add(id);
        el.classList.add('selected');
    }
    const bar = document.getElementById('compare-bar');
    const count = document.getElementById('compare-count');
    const btn = document.getElementById('compare-btn');
    bar.style.display = selected.size > 0 ? 'flex' : 'none';
    count.textContent = selected.size + ' selected';
    btn.disabled = selected.size !== 2;
}

function clearCompare() {
    selected.clear();
    document.querySelectorAll('.compare-cb.selected').forEach(el => el.classList.remove('selected'));
    document.getElementById('compare-bar').style.display = 'none';
}

function openCompare() {
    const ids = Array.from(selected);
    if (ids.length !== 2) return;
    const params = new URLSearchParams(new FormData(document.getElementById('league-setup')));
    params.set('p1', ids[0]);
    params.set('p2', ids[1]);
    htmx.ajax('GET', '/compare?' + params.toString(), {target: '#compare-overlay', swap: 'innerHTML'});
    document.getElementById('compare-overlay').style.display = 'flex';
}

function closeCompare() {
    document.getElementById('compare-overlay').style.display = 'none';
}

function sortTable(colIndex) {
    const table = document.querySelector('.rankings-table');
    if (!table) return;
    const tbody = table.querySelector('tbody');
    const rows = Array.from(tbody.querySelectorAll('tr.player-row'));

    const th = table.querySelectorAll('th')[colIndex];
    const ascending = th.dataset.sort === 'asc';

    // Reset all headers
    table.querySelectorAll('th').forEach(h => delete h.dataset.sort);
    th.dataset.sort = ascending ? 'desc' : 'asc';

    rows.sort((a, b) => {
        const aText = a.children[colIndex]?.textContent.trim().replace('$', '').replace('—', '-999');
        const bText = b.children[colIndex]?.textContent.trim().replace('$', '').replace('—', '-999');
        const aNum = parseFloat(aText);
        const bNum = parseFloat(bText);
        if (!isNaN(aNum) && !isNaN(bNum)) {
            return ascending ? aNum - bNum : bNum - aNum;
        }
        return ascending ? aText.localeCompare(bText) : bText.localeCompare(aText);
    });

    // Re-insert rows, keeping each detail row paired with its player row
    rows.forEach(row => {
        const detailRow = row.nextElementSibling;
        tbody.appendChild(row);
        if (detailRow && detailRow.classList.contains('detail-row')) {
            tbody.appendChild(detailRow);
        }
    });
}

function toggleDetail(playerId, row) {
    const detailRow = document.getElementById('detail-' + playerId);
    if (!detailRow) return;
    if (detailRow.style.display === 'table-row') {
        detailRow.style.display = 'none';
        return;
    }
    if (!detailRow.dataset.loaded) {
        const params = new URLSearchParams(new FormData(document.getElementById('league-setup')));
        htmx.ajax('GET', '/player/' + playerId + '?' + params.toString(), {
            target: '#detail-' + playerId + ' td',
            swap: 'innerHTML',
        });
        detailRow.dataset.loaded = 'true';
    }
    detailRow.style.display = 'table-row';
}
</script>
{% endblock %}
